        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            position: relative;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 1em;
        }
        .lang-toggle {
            position: absolute;
            top: 0;
            right: 0;
        }
        .lang-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9em;
            transition: all 0.3s ease;
            min-width: 80px;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-size: 1em;
            white-space: nowrap;
        }
        .select2-container {
            width: 200px !important;
        }
        .select2-container--default .select2-selection--single {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            height: 42px;
            padding: 6px;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #fff;
            line-height: 28px;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 40px;
        }
        .select2-dropdown {
            background-color: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .select2-search--dropdown .select2-search__field {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .select2-results__option {
            color: #fff;
        }
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: #e74c3c;
        }
        .stats-table-container {
            margin-bottom: 25px;
            overflow-x: auto;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        .stats-table th,
        .stats-table td {
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stats-table th {
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            color: #fff;
        }
        .stats-table td {
            font-size: 1.4em;
            font-weight: bold;
        }
        .stats-table tr:last-child td {
            border-bottom: none;
            background: rgba(255,255,255,0.05);
        }
        .stats-table .color-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
        }
        [dir="ltr"] .stats-table .color-indicator {
            margin-left: 0;
            margin-right: 8px;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .chart-wrapper {
            height: 250px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        .legend-item.clickable {
            cursor: pointer;
            user-select: none;
        }
        .legend-item.clickable.inactive {
            opacity: 0.3;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.85em;
        }
        footer a {
            color: #3498db;
        }
        .section-title {
            text-align: center;
            font-size: 1.5em;
            margin: 30px 0 15px 0;
            color: #f39c12;
        }
        .current-filter {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #3498db;
        }
        /* Desktop: table and graphs at 80% width */
        @media (min-width: 768px) {
            .stats-table-container, .chart-container {
                width: 80%;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>

                });
            });
            knownOrigins.forEach((origin, j) => {
                const oidx = originList.indexOf(origin);
                alarmLast7Chart.data.datasets[j].label = getOriginName(origin);
                alarmLast7Chart.data.datasets[j].data = last7ByOrigin[oidx];
            });
            alarmLast7Chart.data.datasets[knownOrigins.length].label = getOriginName('');
            alarmLast7Chart.data.datasets[knownOrigins.length].data = last7ByOrigin[unknownIdx];
            alarmLast7Chart.update();

            // Update stats
            updateStats(combined);
        }

        function updateStats(histogram) {
            let total = 0;
            // Compute sums first (chronological order) for change calculation
            const sums = days.map(day => histogram[day].reduce((a, b) => a + b, 0));
            sums.forEach(s => total += s);

            let rows = '';
            // Display in reverse order (most recent first)
            for (let i = days.length - 1; i >= 0; i--) {
                const sum = sums[i];
                let changeHtml = '-';
                if (i > 0 && sums[i - 1] > 0) {
                    const pct = ((sum - sums[i - 1]) / sums[i - 1] * 100).toFixed(0);
                    const arrow = sum > sums[i - 1] ? '↑' : (sum < sums[i - 1] ? '↓' : '');
                    const color = sum > sums[i - 1] ? '#e74c3c' : (sum < sums[i - 1] ? '#2ed573' : '#aaa');
                    changeHtml = `<span style="color: ${color}">${arrow} ${pct > 0 ? '+' : ''}${pct}%</span>`;
                }

                rows += `
                    <tr>
                        <td><span class="color-indicator" style="background: ${colors[i % colors.length]}"></span> ${getDayName(i)}</td>
                        <td style="color: ${colors[i % colors.length]}">${sum}</td>
                        <td>${changeHtml}</td>
                    </tr>`;
            }
            rows += `
                <tr>
                    <td><strong>${t('total')}</strong></td>
                    <td style="color: #ffa502"><strong>${total}</strong></td>
                    <td></td>
                </tr>`;

            const html = `
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>${t('day')}</th>
                            <th>${t('alarms')}</th>
                            <th>${t('change')}</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>`;
            document.getElementById('alarmStats').innerHTML = html;
        }

    </script>
</body>
</html>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            position: relative;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 1em;
        }
        .lang-toggle {
            position: absolute;
            top: 0;
            right: 0;
        }
        .lang-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9em;
            transition: all 0.3s ease;
            min-width: 80px;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            font-size: 1em;
            white-space: nowrap;
        }
        .select2-container {
            width: 200px !important;
        }
        .select2-container--default .select2-selection--single {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            height: 42px;
            padding: 6px;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #fff;
            line-height: 28px;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 40px;
        }
        .select2-dropdown {
            background-color: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .select2-search--dropdown .select2-search__field {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .select2-results__option {
            color: #fff;
        }
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: #e74c3c;
        }
        .stats-table-container {
            margin-bottom: 25px;
            overflow-x: auto;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        .stats-table th,
        .stats-table td {
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stats-table th {
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            color: #fff;
        }
        .stats-table td {
            font-size: 1.4em;
            font-weight: bold;
        }
        .stats-table tr:last-child td {
            border-bottom: none;
            background: rgba(255,255,255,0.05);
        }
        .stats-table .color-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
        }
        [dir="ltr"] .stats-table .color-indicator {
            margin-left: 0;
            margin-right: 8px;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .chart-wrapper {
            height: 250px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        .legend-item.clickable {
            cursor: pointer;
            user-select: none;
        }
        .legend-item.clickable.inactive {
            opacity: 0.3;
        }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.85em;
        }
        footer a {
            color: #3498db;
        }
        .section-title {
            text-align: center;
            font-size: 1.5em;
            margin: 30px 0 15px 0;
            color: #f39c12;
        }
        .current-filter {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #3498db;
        }
        /* Desktop: table and graphs at 80% width */
        @media (min-width: 768px) {
            .stats-table-container, .chart-container {
                width: 80%;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>

        const groupColors = ['#e74c3c', '#3498db', '#f39c12', '#2ecc71', '#9b59b6', '#1abc9c', '#e67e22'];
        let activeGroups = new Set(dayGroups.map((_, i) => i));

        function getDayGroupLabel(group) {
            if (group.length === 1) {
                const idx = days.indexOf(group[0]);
                return getDayName(idx);
            }
            const firstIdx = days.indexOf(group[0]);
            const lastIdx = days.indexOf(group[group.length - 1]);
            return getDayName(firstIdx) + ' — ' + getDayName(lastIdx);
        }

        // Compute histogram based on current filters
        // Returns: { combined: {day: [24 hourly counts]}, byOrigin: {day: {originIdx: [24 hourly counts]}} }
        function computeHistogram(originFilter, areaFilter, cityFilter) {
            // Determine which city indices to include
            let allowedCities = null;  // null means all

            if (cityFilter !== '__all__') {
                // Specific city selected
                const cityIdx = cityList.indexOf(cityFilter);
                if (cityIdx >= 0) {
                    allowedCities = new Set([cityIdx]);
                }
            } else if (areaFilter !== '__all__') {
                // Area selected, get all cities in that area
                const areaCities = areaToCities[areaFilter];
                if (areaCities) {
                    allowedCities = new Set(areaCities);
                }
            }

            // Determine origin filter
            let allowedOrigin = null;  // null means all
            if (originFilter !== '__all__') {
                allowedOrigin = originList.indexOf(originFilter);
            }

            // Initialize histograms
            const combined = {};
            const byOrigin = {};
            days.forEach(day => {
                combined[day] = new Array(24).fill(0);
                byOrigin[day] = {};
                originList.forEach((_, idx) => {
                    byOrigin[day][idx] = new Array(24).fill(0);
                });
            });

            // Process alarms
            alarmData.forEach(alarm => {
                // Check origin filter
                if (allowedOrigin !== null && alarm.o !== allowedOrigin) {
                    return;
                }

                // Check city filter
                if (allowedCities !== null) {
                    const hasMatchingCity = alarm.c.some(c => allowedCities.has(c));
                    if (!hasMatchingCity) {
                        return;
                    }
                }

                // Extract day and hour from timestamp
                const dayStr = alarm.t.substring(0, 10);
                const hour = parseInt(alarm.t.substring(11, 13), 10);

                if (combined[dayStr]) {
                    combined[dayStr][hour]++;
                    byOrigin[dayStr][alarm.o][hour]++;
                }
            });

            return { combined, byOrigin };
        }

        // URL parameter handling
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function setUrlParams(params) {
            const url = new URL(window.location);
            Object.entries(params).forEach(([key, value]) => {
                if (value && value !== '__all__') {
                    url.searchParams.set(key, value);
                } else {
                    url.searchParams.delete(key);
                }
            });
            window.history.replaceState({}, '', url);
        }

        // Initialize Select2
        $(document).ready(function() {
            $('#originSelect, #areaSelect, #citySelect').select2({
                allowClear: false,
                width: '200px'
            });

            // Language toggle - single button that toggles between languages
            document.getElementById('langToggleBtn').addEventListener('click', () => {
                setLanguage(currentLang === 'he' ? 'en' : 'he');
            });

            // When area changes, update city dropdown
            $('#areaSelect').on('change', function() {
                const area = this.value;
                updateCityOptions(area);
                updateFromFilters();
            });

            $('#originSelect, #citySelect').on('change', function() {
                updateFromFilters();
            });

            // Initial render
            initCharts();

            // Check URL for parameters
            const urlOrigin = getUrlParam('origin') || '__all__';
            const urlArea = getUrlParam('area') || '__all__';
            const urlCity = getUrlParam('city') || '__all__';
            const urlLang = getUrlParam('lang');

            $('#originSelect').val(urlOrigin).trigger('change.select2');
            $('#areaSelect').val(urlArea).trigger('change.select2');
            updateCityOptions(urlArea);
            $('#citySelect').val(urlCity).trigger('change.select2');

            // Set initial language
            setLanguage(urlLang || currentLang);
        });

        function updateCityOptions(area) {
            const citySelect = $('#citySelect');
            const currentCity = citySelect.val();

            // Clear and rebuild options
            citySelect.empty();
            citySelect.append(`<option value="__all__">${t('all')}</option>`);

            if (area === '__all__') {
                // Show all cities
                cityList.forEach(city => {
                    citySelect.append(`<option value="${city}">${getCityName(city)}</option>`);
                });
            } else {
                // Show only cities in selected area
                const areaCityIndices = areaToCities[area] || [];
                areaCityIndices.forEach(idx => {
                    const city = cityList[idx];
                    citySelect.append(`<option value="${city}">${getCityName(city)}</option>`);
                });
            }

            // Try to keep current selection if still valid
            if (citySelect.find(`option[value="${currentCity}"]`).length > 0) {
                citySelect.val(currentCity);
            } else {
                citySelect.val('__all__');
            }
            citySelect.trigger('change.select2');
        }

        function updateFromFilters() {
            const origin = $('#originSelect').val();
            const area = $('#areaSelect').val();
            const city = $('#citySelect').val();

            setUrlParams({origin, area, city});

            const histogramData = computeHistogram(origin, area, city);
            updateCharts(histogramData, origin, area, city);
        }

        function initCharts() {
            updateLegends();

            // Initialize combined chart (all days, grouped by 3)
            alarmCombinedChart = createGroupedChart('alarmCombinedChart');
            alarmLast3Chart = createOriginStackedChart('alarmLast3Chart');
            alarmLast7Chart = createOriginStackedChart('alarmLast7Chart');
        }

        function createGroupedChart(canvasId) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours,
                    datasets: dayGroups.map((group, g) => ({
                        label: getDayGroupLabel(group),
                        data: new Array(24).fill(0),
                        backgroundColor: groupColors[g % groupColors.length],
                        borderColor: groupColors[g % groupColors.length],
                        borderWidth: 1
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: { color: '#aaa' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function createOriginStackedChart(canvasId) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const knownOrigins = originList.filter(o => o !== '');
            const datasets = knownOrigins.map(origin => ({
                label: getOriginName(origin),
                data: new Array(24).fill(0),
                backgroundColor: originColors[origin],
                borderColor: originColors[origin],
                borderWidth: 1
            }));
            datasets.push({
                label: getOriginName(''),
                data: new Array(24).fill(0),
                backgroundColor: originColors[''],
                borderColor: originColors[''],
                borderWidth: 1
            });
            return new Chart(ctx, {
                type: 'bar',
                data: { labels: hours, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { stacked: true, ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { stacked: true, beginAtZero: true, ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        function updateCharts(histogramData, origin, area, city) {
            const { combined, byOrigin } = histogramData;

            // Build display name with translations
            let displayParts = [];
            if (origin !== '__all__') displayParts.push(getOriginName(origin));
            if (area !== '__all__') displayParts.push(getAreaName(area));
            if (city !== '__all__') displayParts.push(getCityName(city));
            const displayName = displayParts.length > 0 ? displayParts.join(' | ') : t('all');
            document.getElementById('currentFilterDisplay').textContent = displayName;

            // Update combined chart (stacked by day groups)
            const groupData = [];
            dayGroups.forEach((group, g) => {
                const merged = new Array(24).fill(0);
                group.forEach(day => {
                    combined[day].forEach((v, h) => merged[h] += v);
                });
                groupData.push(merged);
                alarmCombinedChart.data.datasets[g].label = getDayGroupLabel(group);
                alarmCombinedChart.data.datasets[g].data = merged;
            });
            // Fix Y axis max to the total stacked height (all groups visible)
            const stackedTotals = new Array(24).fill(0);
            groupData.forEach(d => d.forEach((v, h) => stackedTotals[h] += v));
            const yMax = Math.max(...stackedTotals);
            alarmCombinedChart.options.scales.y.max = yMax > 0 ? yMax + Math.ceil(yMax * 0.1) : undefined;
            alarmCombinedChart.update();

            // Update last 3 days chart (stacked by origin)
            const knownOrigins = originList.filter(o => o !== '');
            const unknownIdx = originList.indexOf('');
            const last3ByOrigin = {};
            originList.forEach((_, idx) => { last3ByOrigin[idx] = new Array(24).fill(0); });
            last3Days.forEach(day => {
                originList.forEach((_, idx) => {
                    byOrigin[day][idx].forEach((v, h) => last3ByOrigin[idx][h] += v);
                });
            });
            knownOrigins.forEach((origin, j) => {
                const oidx = originList.indexOf(origin);
                alarmLast3Chart.data.datasets[j].label = getOriginName(origin);
                alarmLast3Chart.data.datasets[j].data = last3ByOrigin[oidx];
            });
            alarmLast3Chart.data.datasets[knownOrigins.length].label = getOriginName('');
            alarmLast3Chart.data.datasets[knownOrigins.length].data = last3ByOrigin[unknownIdx];
            alarmLast3Chart.update();

            // Update last 7 days chart (stacked by origin)
            const last7ByOrigin = {};
            originList.forEach((_, idx) => { last7ByOrigin[idx] = new Array(24).fill(0); });
            last7Days.forEach(day => {
                originList.forEach((_, idx) => {
                    byOrigin[day][idx].forEach((v, h) => last7ByOrigin[idx][h] += v);
                });
            });
            knownOrigins.forEach((origin, j) => {
                const oidx = originList.indexOf(origin);
                alarmLast7Chart.data.datasets[j].label = getOriginName(origin);
                alarmLast7Chart.data.datasets[j].data = last7ByOrigin[oidx];
            });
            alarmLast7Chart.data.datasets[knownOrigins.length].label = getOriginName('');
            alarmLast7Chart.data.datasets[knownOrigins.length].data = last7ByOrigin[unknownIdx];
            alarmLast7Chart.update();

            // Update stats
            updateStats(combined);
        }

        function updateStats(histogram) {
            let total = 0;
            // Compute sums first (chronological order) for change calculation
            const sums = days.map(day => histogram[day].reduce((a, b) => a + b, 0));
            sums.forEach(s => total += s);

            let rows = '';
            // Display in reverse order (most recent first)
            for (let i = days.length - 1; i >= 0; i--) {
                const sum = sums[i];
                let changeHtml = '-';
                if (i > 0 && sums[i - 1] > 0) {
                    const pct = ((sum - sums[i - 1]) / sums[i - 1] * 100).toFixed(0);
                    const arrow = sum > sums[i - 1] ? '↑' : (sum < sums[i - 1] ? '↓' : '');
                    const color = sum > sums[i - 1] ? '#e74c3c' : (sum < sums[i - 1] ? '#2ed573' : '#aaa');
                    changeHtml = `<span style="color: ${color}">${arrow} ${pct > 0 ? '+' : ''}${pct}%</span>`;
                }

                rows += `
                    <tr>
                        <td><span class="color-indicator" style="background: ${colors[i % colors.length]}"></span> ${getDayName(i)}</td>
                        <td style="color: ${colors[i % colors.length]}">${sum}</td>
                        <td>${changeHtml}</td>
                    </tr>`;
            }
            rows += `
                <tr>
                    <td><strong>${t('total')}</strong></td>
                    <td style="color: #ffa502"><strong>${total}</strong></td>
                    <td></td>
                </tr>`;

            const html = `
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>${t('day')}</th>
                            <th>${t('alarms')}</th>
                            <th>${t('change')}</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>`;
            document.getElementById('alarmStats').innerHTML = html;
        }

    </script>
</body>
